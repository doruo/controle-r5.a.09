services:

  app-dev:
    build:
      context: .
      dockerfile_inline: |
        FROM php:8.4-apache 
        RUN docker-php-ext-install pdo pdo_mysql
        RUN docker-php-ext-enable pdo pdo_mysql 
        COPY app.xdebug.ini /usr/local/etc/php/conf.d
    environment:
      XDEBUG_TRIGGER: 1
    networks:
      - db
      - external
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dev-web.rule=Host(\"dev.td.anthonymoll.fr\")"
      - "traefik.http.routers.dev-web.entrypoints=web"
      - "traefik.http.services.dev.loadbalancer.server.port=80"


  bd-dev:
    image: mariadb:latest
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: db
    ports:
      - "3306:3306"
    networks:
      - db
      - external


  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admindb-web.rule=Host(\"admindb.td.anthonymoll.fr\")"
      - "traefik.http.routers.admindb-web.entrypoints=web"
      - "traefik.http.services.admindb.loadbalancer.server.port=80"
    networks:
      - db
      - external

networks:
  db:
  external:
    external: true

