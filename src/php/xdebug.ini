zend_extension=xdebug

; On ne l’active que sur demande pour éviter l’overhead
xdebug.mode = trace,develop
xdebug.start_with_request = trigger     ; activer via un "trigger" (voir ci-dessous)

; Fichiers de trace
xdebug.output_dir = /tmp/xdebug
xdebug.trace_output_name = trace  ; nom des fichiers

; Optionnel : plus de détails dans le trace
xdebug.collect_params = 1
xdebug.collect_return = 1
xdebug.trace_format = 1                 ; format lisible (texte)
