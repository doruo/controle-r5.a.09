services:
  #loki est un gestionnaire centralis´e de logs
  loki:
    image: grafana/loki:2.9.0
    env_file:
      - .env
    ports:
      - "${LOKI_PORT_INT}:${LOKI_PORT_EXT}"
    command:
      -config.file=/etc/loki/local-config.yaml
    networks:
      - loki
      - external
  #promtail permet de faire remonter les logs de la machine locale dans le loki
  promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - /var/log:/var/log
    command: -config.file=/etc/promtail/config.yml
    networks:
    - loki
    - external
  #grafana est l’interface graphique qui permet d’interroger l’API de loki
  grafana:
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
        - name: Loki
        type: loki
        access: proxy
        1orgId: 1
        url: http://loki:3100
        basicAuth: false
        isDefault: true
        version: 1
        editable: false
        EOF
        /run.sh
    image: grafana/grafana:latest
    env_file:
      - .env
    ports:
      - "${GRAFANA_PORT_INT}:${GRAFANA_PORT_EXT}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`logs.td.anthonymoll.fr`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.services.grafana.loadbalancer.server.port=${GRAFANA_PORT_EXT}"
    networks:
        - loki
        - external
networks:
  loki:
  external:
    external: true

