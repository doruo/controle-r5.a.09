version: ’3’	
services:
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "${TRAEFIK_PORTINT1}:${TRAEFIK_PORTEXT1}"
      - "${TRAEFIK_PORTINT2}:${TRAEFIK_PORTEXT2}"
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.td.anthonymoll.fr`)"
      - "traefik.http.routers.traefik.entrypoints=web"
      - "traefik.http.services.traefik.loadbalancer.server.port=${TRAEFIK_PORTINT2}"
    logging:
      driver: loki
      options:
        loki-url: http://127.0.0.1:3100/loki/api/v1/push
        loki-pipeline-stages: |
          - regex:
              expression: ’(level|lvl|severity)=(?P<level>\w+)’
          - labels:
              level:
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - external
networks:
  external:
    external: true
    
    
    
